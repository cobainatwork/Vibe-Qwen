server {
    listen 8080;
    server_name _;

    # /api 反向代理至 BFF。以 resolver + 變數 upstream 將解析延到請求時，
    # 經 Docker 內嵌 DNS（127.0.0.11）解析，避免啟動時 bff 未就緒即崩潰，
    # 亦能跟上 bff 容器重啟後的新 IP（字面 upstream 會永久快取舊 IP）。
    location /api/ {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $bff_upstream bff:8000;
        proxy_pass http://$bff_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
